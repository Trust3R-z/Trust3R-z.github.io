<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="qg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef6c5b">
        <animate attributeName="stop-color"
                 values="#ef6c5b;#0e7c86;#d44a3a;#0a5a62;#ef6c5b"
                 dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0e7c86">
        <animate attributeName="stop-color"
                 values="#0e7c86;#ef6c5b;#0a5a62;#d44a3a;#0e7c86"
                 dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  <text x="50%" y="52%"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
        font-weight="900"
        font-size="60"
        fill="url(#qg)">?</text>
</svg>
